name: Deploy to GitHub Pages

on:
  # Déclenche le workflow à chaque push sur la branche principale
  push:
    branches: [ main ]
  # Permet également de déclencher le workflow manuellement depuis l'interface GitHub
  workflow_dispatch:

# Permissions nécessaires pour que GitHub Actions puisse publier sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Optionnel: annuler un run précédent en cours s'il y a un nouveau push
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
      
      - name: Install, build, and upload your Astro site
        uses: withastro/action@v3
        with:
          # Spécifie la version de Node à utiliser
          node-version: 22
          package-manager: npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
